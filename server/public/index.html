<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAXI FILTER | Cloud Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-container"></div>
    
    <header>
        <div class="logo">
            <span class="neon-text">TAXI FILTER</span> <span class="version">PRO CLOUD</span>
        </div>
        <div class="system-status">
            <span class="status-dot online"></span> SYSTEM ONLINE
        </div>
    </header>

    <main>
        <div class="dashboard-grid">
            <!-- Stats Column -->
            <div class="side-panel">
                <div class="stats-card glass">
                    <h3>ОБЩАЯ СТАТИСТИКА</h3>
                    <div class="stat-row">
                        <span>Активных водителей:</span>
                        <span id="active-drivers" class="glow-blue">0</span>
                    </div>
                    <div class="stat-row">
                        <span>Заказов в базе:</span>
                        <span id="total-orders" class="glow-green">0</span>
                    </div>
                    <div class="stat-row">
                        <span>Умных адресов:</span>
                        <span id="intel-size" class="glow-purple">0</span>
                    </div>
                </div>

                <div class="intel-card glass">
                    <h3>HOT ZONES (БЕЛЫЙ СПИСОК)</h3>
                    <ul id="whitelist-list">
                        <!-- Сюда попадут адреса из облака -->
                    </ul>
                </div>

                <div class="intel-card glass">
                    <h3>DEAD ZONES (ЧЕРНЫЙ СПИСОК)</h3>
                    <ul id="blacklist-list">
                        <li>Загрузка...</li>
                    </ul>
                </div>
            </div>

            <!-- Map Column -->
            <div class="map-container glass">
                <div id="map"></div>
                <div class="map-overlay">
                    <span class="map-title">LIVE DRIVER NETWORK | VARSAVIA</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TAXI FILTER PRO. All Rights Reserved. <span class="cyan-link">v1.2.0-cloud</span></p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
