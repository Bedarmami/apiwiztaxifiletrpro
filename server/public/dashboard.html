<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚕 TaxiFilter Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            color: #e0e6ff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1f35, #0d1224);
            border-bottom: 1px solid #2a3050;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 20px;
            color: #7eb8ff;
        }

        .header .badge {
            background: #1e3a5f;
            color: #4da6ff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 12px 24px;
            background: #0d1224;
            border-bottom: 1px solid #1e2840;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #7a8ab0;
            transition: all 0.2s;
        }

        .tab.active {
            background: #1e3a5f;
            color: #4da6ff;
        }

        .tab:hover:not(.active) {
            background: #151c30;
            color: #b0c0e0;
        }

        .content {
            padding: 24px;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #111827;
            border: 1px solid #1e2840;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-card .label {
            font-size: 12px;
            color: #5a7090;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #4da6ff;
        }

        .stat-card .sub {
            font-size: 13px;
            color: #7a9ab0;
        }

        .section-title {
            font-size: 16px;
            color: #7eb8ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* REPORTS */
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .report-item {
            background: #111827;
            border: 1px solid #1e2840;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .report-item:hover {
            border-color: #2a4080;
            background: #141e30;
        }

        .report-item.reviewed {
            opacity: 0.5;
        }

        .report-item .emoji {
            font-size: 20px;
            min-width: 24px;
        }

        .report-item .info {
            flex: 1;
        }

        .report-item .device {
            font-size: 13px;
            color: #7eb8ff;
            margin-bottom: 4px;
        }

        .report-item .preview {
            font-size: 12px;
            color: #5a7090;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 600px;
        }

        .report-item .time {
            font-size: 11px;
            color: #3a5070;
            white-space: nowrap;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #111827;
            border: 1px solid #2a3a60;
            border-radius: 16px;
            max-width: 800px;
            width: 95%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #1e2840;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #7eb8ff;
            font-size: 16px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #5a7090;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-body {
            padding: 16px 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-body pre {
            font-family: monospace;
            font-size: 12px;
            color: #b0c8e0;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid #1e2840;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #1e4a8a;
            color: #7eb8ff;
        }

        .btn-primary:hover {
            background: #2a5fa0;
        }

        .btn-secondary {
            background: #1a2030;
            color: #7a8ab0;
        }

        /* TOP DESTS */
        .dest-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .dest-item {
            background: #111827;
            border: 1px solid #1e2840;
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dest-item .rank {
            color: #3a6090;
            font-size: 12px;
            width: 24px;
        }

        .dest-item .addr {
            flex: 1;
            font-size: 13px;
        }

        .dest-item .cnt {
            color: #4da6ff;
            font-size: 13px;
            font-weight: 600;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .badge-new {
            background: #7b2020;
            color: #ff8080;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
    </style>
</head>

<body>

    <div class="header">
        <span style="font-size:24px">🚕</span>
        <h1>TaxiFilter Dashboard</h1>
        <span class="badge" id="serverBadge">Соединение...</span>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('stats')">📊 Статистика</div>
        <div class="tab" onclick="showTab('reports')" id="reportsTab">🐞 Репорты</div>
    </div>

    <div class="content">
        <!-- STATS PAGE -->
        <div id="page-stats" class="page active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">Сегодня заказов</div>
                    <div class="value" id="todayCount">—</div>
                    <div class="sub" id="todayEarnings">Загрузка...</div>
                </div>
                <div class="stat-card">
                    <div class="label">Ставка сегодня</div>
                    <div class="value" id="todayRate">—</div>
                    <div class="sub">zł/ч среднее</div>
                </div>
                <div class="stat-card">
                    <div class="label">Всего заказов</div>
                    <div class="value" id="totalCount">—</div>
                    <div class="sub" id="totalEarnings">За всё время</div>
                </div>
                <div class="stat-card">
                    <div class="label">Репортов новых</div>
                    <div class="value" id="newReports">—</div>
                    <div class="sub">не просмотрено</div>
                </div>
            </div>

            <div class="section-title">📍 Топ направлений</div>
            <div class="dest-list" id="topDests">
                <div style="color:#3a5070;font-size:13px">Нет данных — нужно указать Device ID</div>
            </div>

            <div style="margin-top:20px">
                <label style="color:#5a7090;font-size:13px">Device ID для статистики:</label><br>
                <div style="display:flex;gap:8px;margin-top:6px">
                    <input id="deviceIdInput" type="text" placeholder="e.g. abc123..."
                        style="background:#111827;border:1px solid #1e2840;color:#e0e6ff;padding:8px 12px;border-radius:8px;font-size:13px;width:280px">
                    <button class="btn btn-primary" onclick="loadStats()">Загрузить</button>
                </div>
            </div>
        </div>

        <!-- REPORTS PAGE -->
        <div id="page-reports" class="page">
            <div class="section-title">
                🐞 Баг-репорты <span class="badge-new" id="newReportsBadge" style="display:none"></span>
            </div>
            <div class="report-list" id="reportsList">
                <div style="color:#3a5070;font-size:13px">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Репорт</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <pre id="modalContent">Загрузка...</pre>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Закрыть</button>
                <button class="btn btn-primary" id="markReviewedBtn" onclick="markReviewed()">✅ Просмотрено</button>
            </div>
        </div>
    </div>

    <script>
        let currentReportId = null;

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('page-' + tab).classList.add('active');
            if (tab === 'reports') loadReports();
        }

        async function loadStats() {
            const deviceId = document.getElementById('deviceIdInput').value.trim();
            if (!deviceId) return;

            try {
                const r = await fetch(`/api/taxifilter/mystats?device_id=${encodeURIComponent(deviceId)}`);
                const d = await r.json();

                document.getElementById('todayCount').textContent = d.today?.count || 0;
                document.getElementById('todayEarnings').textContent = parseFloat(d.today?.total || 0).toFixed(2) + ' zł сегодня';
                document.getElementById('todayRate').textContent = Math.round(d.today?.avg_rate || 0);
                document.getElementById('totalCount').textContent = d.allTime?.count || 0;
                document.getElementById('totalEarnings').textContent = parseFloat(d.allTime?.total || 0).toFixed(2) + ' zł всего';

                const topDests = document.getElementById('topDests');
                if (d.topDestinations?.length) {
                    topDests.innerHTML = d.topDestinations.map((dest, i) => `
        <div class="dest-item">
          <div class="rank">#${i + 1}</div>
          <div class="addr">${dest.destination || '—'}</div>
          <div class="cnt">${dest.cnt}×</div>
        </div>
      `).join('');
                } else {
                    topDests.innerHTML = '<div style="color:#3a5070;font-size:13px">Нет данных</div>';
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadReports() {
            try {
                const r = await fetch('/api/taxifilter/reports');
                const reports = await r.json();

                const list = document.getElementById('reportsList');
                if (!reports.length) {
                    list.innerHTML = '<div style="color:#3a5070;font-size:13px">Репортов пока нет</div>';
                    return;
                }

                list.innerHTML = reports.map(rep => `
      <div class="report-item ${rep.reviewed ? 'reviewed' : ''}" onclick="openReport(${rep.id})">
        <div class="emoji">${rep.is_good ? '✅' : '🐞'}</div>
        <div class="info">
          <div class="device">📱 ${rep.device_model} · ID: ${rep.device_id}</div>
          <div class="preview">${(rep.preview || '').replace(/\n/g, ' ')}</div>
        </div>
        <div class="time">${formatTime(rep.timestamp)}</div>
      </div>
    `).join('');
            } catch (e) {
                document.getElementById('reportsList').innerHTML = '<div style="color:#ff6060">Ошибка загрузки</div>';
            }
        }

        async function openReport(id) {
            currentReportId = id;
            document.getElementById('reportModal').classList.add('open');
            document.getElementById('modalContent').textContent = 'Загрузка...';

            const r = await fetch(`/api/taxifilter/reports/${id}`);
            const rep = await r.json();

            document.getElementById('modalTitle').textContent =
                `${rep.is_good ? '✅' : '🐞'} Репорт #${id} · ${rep.device_model}`;
            document.getElementById('modalContent').textContent = rep.log_text || 'Пусто';
        }

        function closeModal() {
            document.getElementById('reportModal').classList.remove('open');
            currentReportId = null;
        }

        async function markReviewed() {
            if (!currentReportId) return;
            await fetch(`/api/taxifilter/reports/${currentReportId}/review`, { method: 'POST' });
            closeModal();
            loadReports();
        }

        function formatTime(ts) {
            if (!ts) return '—';
            const d = new Date(parseInt(ts));
            return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        async function loadGlobalStats() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();
                document.getElementById('serverBadge').textContent = '✅ Онлайн';
                document.getElementById('newReports').textContent = d.unreviewedReports || 0;
                if (d.unreviewedReports > 0) {
                    const badge = document.getElementById('newReportsBadge');
                    badge.style.display = 'inline';
                    badge.textContent = d.unreviewedReports + ' новых';
                    document.getElementById('reportsTab').textContent = `🐞 Репорты (${d.unreviewedReports})`;
                }
            } catch (e) {
                document.getElementById('serverBadge').textContent = '❌ Офлайн';
            }
        }

        // Init
        loadGlobalStats();
        setInterval(loadGlobalStats, 30000);

        // Сохранённый device_id
        const savedId = localStorage.getItem('taxifilter_device_id');
        if (savedId) {
            document.getElementById('deviceIdInput').value = savedId;
            loadStats();
        }
        document.getElementById('deviceIdInput').addEventListener('change', (e) => {
            localStorage.setItem('taxifilter_device_id', e.target.value);
        });
    </script>
</body>

</html>
